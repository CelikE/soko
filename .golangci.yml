version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/CelikE/soko

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - revive
    - misspell
    - unconvert
    - gocritic
    - nolintlint
    - errorlint
    - bodyclose
    - noctx
    - prealloc
    - whitespace
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: increment-decrement
        - name: var-naming
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    nolintlint:
      require-explanation: true
      require-specific: true
    errorlint:
      errorf: true
      asserts: true
      comparison: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
